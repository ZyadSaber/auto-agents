networks:
  ai-net:
    driver: bridge

volumes:
  ollama-data:
  chroma-data:
  anythingllm-storage:
  docs-agent-db:
  general-agent-db:
  bridge-data:
  dashboard-data:

services:

  # ─────────────────────────────────────────────────────────────
  # OLLAMA — runs independently, no dependencies
  # ─────────────────────────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    networks:
      - ai-net
    environment:
      - OLLAMA_KEEP_ALIVE=24h
      - OLLAMA_NUM_THREAD=${OLLAMA_NUM_THREAD:-8}
      - OLLAMA_NUM_PARALLEL=${OLLAMA_NUM_PARALLEL:-2}
      - OLLAMA_MAX_LOADED_MODELS=${OLLAMA_MAX_LOADED_MODELS:-2}
      - OLLAMA_FLASH_ATTENTION=1
      - OLLAMA_MAX_QUEUE=512
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    deploy:
      resources:
        limits:
          cpus: "${OLLAMA_CPU_LIMIT:-0}"
          memory: "${OLLAMA_MEM_LIMIT:-0}"
        reservations:
          cpus: "${OLLAMA_CPU_RESERVE:-0}"
          memory: "${OLLAMA_MEM_RESERVE:-0}"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:11434/api/tags || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 30s

  # ─────────────────────────────────────────────────────────────
  # CHROMADB
  # ─────────────────────────────────────────────────────────────
  chromadb:
    image: chromadb/chroma:0.5.3
    container_name: chromadb
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - chroma-data:/chroma/chroma
    networks:
      - ai-net
    environment:
      - ANONYMIZED_TELEMETRY=false
      - IS_PERSISTENT=TRUE
      - CHROMA_SERVER_THREAD_POOL_SIZE=8
    deploy:
      resources:
        limits:
          cpus: "${CHROMA_CPU_LIMIT:-0}"
          memory: "${CHROMA_MEM_LIMIT:-0}"
        reservations:
          cpus: "${CHROMA_CPU_RESERVE:-0}"
          memory: "${CHROMA_MEM_RESERVE:-0}"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/api/v1/heartbeat || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 30s

  # ─────────────────────────────────────────────────────────────
  # DOCS AGENT
  # ─────────────────────────────────────────────────────────────
  docs-agent:
    build:
      context: ./agents/docs-agent
      dockerfile: Dockerfile
    container_name: docs-agent
    restart: unless-stopped
    ports:
      - "8100:8100"
    volumes:
      - docs-agent-db:/app/db
      - ./uploads:/app/uploads
    networks:
      - ai-net
    env_file:
      - .env
    depends_on:
      ollama:
        condition: service_healthy
      chromadb:
        condition: service_healthy
    environment:
      # Service URLs — hardcoded to docker-compose service names, not secrets
      - OLLAMA_BASE_URL=http://ollama:11434
      - CHROMA_HOST=chromadb
      - CHROMA_PORT=8000
      - UPLOAD_DIR=/app/uploads
      - DB_PATH=/app/db/solutions.db
      - PORT=8100
      # Non-secret config with safe defaults
      - COLLECTION_NAME=${COLLECTION_NAME:-customer_docs}
      - SOLUTIONS_COLLECTION=${SOLUTIONS_COLLECTION:-known_solutions}
      - EMBED_MODEL=${EMBED_MODEL:-nomic-embed-text}
      - CHAT_MODEL=${CHAT_MODEL:-aya-expanse:8b}
      - RATE_LIMIT_RPM=${RATE_LIMIT_RPM:-20}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-http://127.0.0.1,http://10.0.0.11}
      # Secrets — must be set in .env (no fallback defaults here)
      - AGENT_API_KEY=${AGENT_API_KEY}
    deploy:
      resources:
        limits:
          cpus: "${DOCS_CPU_LIMIT:-0}"
          memory: "${DOCS_MEM_LIMIT:-0}"
        reservations:
          cpus: "${DOCS_CPU_RESERVE:-0}"
          memory: "${DOCS_MEM_RESERVE:-0}"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8100/health || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 10
      start_period: 60s

  # ─────────────────────────────────────────────────────────────
  # GENERAL AGENT
  # ─────────────────────────────────────────────────────────────
  general-agent:
    build:
      context: ./agents/general-agent
      dockerfile: Dockerfile
    container_name: general-agent
    restart: unless-stopped
    ports:
      - "8200:8200"
    volumes:
      - general-agent-db:/app/db
    networks:
      - ai-net
    env_file:
      - .env
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - DB_PATH=/app/db/general_history.db
      - PORT=8200
      - CHAT_MODEL=${CHAT_MODEL:-aya-expanse:32b}
      - RATE_LIMIT_RPM=${RATE_LIMIT_RPM:-20}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-http://127.0.0.1,http://10.0.0.11}
      # Secrets — must be set in .env
      - AGENT_API_KEY=${AGENT_API_KEY}
    deploy:
      resources:
        limits:
          cpus: "${GENERAL_CPU_LIMIT:-0}"
          memory: "${GENERAL_MEM_LIMIT:-0}"
        reservations:
          cpus: "${GENERAL_CPU_RESERVE:-0}"
          memory: "${GENERAL_MEM_RESERVE:-0}"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8200/health || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 10
      start_period: 60s

  # ─────────────────────────────────────────────────────────────
  # CS DASHBOARD
  # ─────────────────────────────────────────────────────────────
  cs-dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    container_name: cs-dashboard
    restart: unless-stopped
    ports:
      - "${DASHBOARD_PORT:-3001}:3001"
    volumes:
      - dashboard-data:/app/data
    networks:
      - ai-net
    env_file:
      - .env
    depends_on:
      ollama:
        condition: service_healthy
      docs-agent:
        condition: service_healthy
      general-agent:
        condition: service_healthy
    environment:
      - PORT=3001
      - DB_PATH=/app/data/dashboard.db
      # Service URLs
      - OLLAMA_BASE_URL=http://ollama:11434
      - DOCS_AGENT_URL=http://docs-agent:8100
      - GENERAL_AGENT_URL=http://general-agent:8200
      - BRIDGE_URL=http://bridge:3100
      - CHROMADB_URL=http://chromadb:8000
      # Non-secret config with safe defaults
      - CHAT_MODEL=${CHAT_MODEL:-aya-expanse:32b}
      - ARABIC_MODEL=${ARABIC_MODEL:-qwen2.5:72b}
      - ENGLISH_MODEL=${ENGLISH_MODEL:-llama3.3:70b}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-http://127.0.0.1,http://10.0.0.11}
      - MONITOR_REFRESH_INTERVAL=${MONITOR_REFRESH_INTERVAL:-5000}
      - PORTAINER_URL=${PORTAINER_URL:-}
      - PORTAINER_ENABLED=${PORTAINER_ENABLED:-false}
      - SYSTEM_NAME=${SYSTEM_NAME:-AI Customer Service}
      - COMPANY_NAME=${COMPANY_NAME:-}
      - SYSTEM_TAGLINE=${SYSTEM_TAGLINE:-Powered by local AI}
      # Secrets — must be set in .env
      - JWT_SECRET=${JWT_SECRET}
      - AGENT_API_KEY=${AGENT_API_KEY}
      - INITIAL_ADMIN_USERNAME=${INITIAL_ADMIN_USERNAME}
      - INITIAL_ADMIN_PASSWORD=${INITIAL_ADMIN_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3001/api/health || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 10
      start_period: 30s

  # ─────────────────────────────────────────────────────────────
  # BRIDGE (Channel Bridge)
  # ─────────────────────────────────────────────────────────────
  bridge:
    build:
      context: ./bridge
      dockerfile: Dockerfile
    container_name: bridge
    restart: unless-stopped
    ports:
      - "3100:3100"
    volumes:
      - bridge-data:/app/data
    networks:
      - ai-net
    env_file:
      - .env
    depends_on:
      docs-agent:
        condition: service_healthy
      general-agent:
        condition: service_healthy
    environment:
      - PORT=3100
      - DOCS_AGENT_URL=http://docs-agent:8100
      - GENERAL_AGENT_URL=http://general-agent:8200
      - WHATSAPP_SESSION_NAME=cs-bot
      # Feature flags with safe defaults
      - ENABLE_WHATSAPP=${ENABLE_WHATSAPP:-true}
      - ENABLE_TELEGRAM=${ENABLE_TELEGRAM:-true}
      - ENABLE_SECOND_TELEGRAM=${ENABLE_SECOND_TELEGRAM:-false}
      # Secrets — must be set in .env
      - AGENT_API_KEY=${AGENT_API_KEY}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - SECOND_TELEGRAM_BOT_TOKEN=${SECOND_TELEGRAM_BOT_TOKEN}
      - CLICKUP_API_KEY=${CLICKUP_API_KEY}
    deploy:
      resources:
        limits:
          cpus: "${BRIDGE_CPU_LIMIT:-0}"
          memory: "${BRIDGE_MEM_LIMIT:-0}"
        reservations:
          cpus: "${BRIDGE_CPU_RESERVE:-0}"
          memory: "${BRIDGE_MEM_RESERVE:-0}"

  # ─────────────────────────────────────────────────────────────
  # NGINX
  # ─────────────────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - ai-net
    depends_on:
      cs-dashboard:
        condition: service_healthy
      bridge:
        condition: service_started
    deploy:
      resources:
        limits:
          cpus: "${NGINX_CPU_LIMIT:-0}"
          memory: "${NGINX_MEM_LIMIT:-0}"
        reservations:
          cpus: "${NGINX_CPU_RESERVE:-0}"
          memory: "${NGINX_MEM_RESERVE:-0}"
