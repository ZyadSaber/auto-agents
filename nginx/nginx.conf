events {
    worker_connections 1024;
}

http {
    # ── Upstream services ────────────────────────────────────────────────────
    upstream anythingllm {
        server anythingllm:3001;
    }
    upstream docs_agent {
        server docs-agent:8100;
    }
    upstream general_agent {
        server general-agent:8200;
    }
    upstream openclaw {
        server openclaw:3100;
    }

    # ── Main server block ─────────────────────────────────────────────────────
    server {
        listen 80;
        server_name _;

        client_max_body_size 100M;   # allow large document uploads

        # AnythingLLM – main chat UI
        location / {
            proxy_pass         http://anythingllm;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   Upgrade           $http_upgrade;
            proxy_set_header   Connection        "upgrade";
            proxy_http_version 1.1;
            proxy_read_timeout 300s;
        }

        # Docs Agent API
        location /api/docs/ {
            rewrite ^/api/docs/(.*)$ /$1 break;
            proxy_pass         http://docs_agent;
            proxy_set_header   Host            $host;
            proxy_set_header   X-Real-IP       $remote_addr;
            proxy_read_timeout 120s;
        }

        # General Agent API
        location /api/general/ {
            rewrite ^/api/general/(.*)$ /$1 break;
            proxy_pass         http://general_agent;
            proxy_set_header   Host            $host;
            proxy_set_header   X-Real-IP       $remote_addr;
            proxy_read_timeout 120s;
        }

        # OpenClaw Bridge (WhatsApp/Telegram)
        location /bridge/ {
            rewrite ^/bridge/(.*)$ /$1 break;
            proxy_pass         http://openclaw;
            proxy_set_header   Host            $host;
            proxy_set_header   X-Real-IP       $remote_addr;
        }

        # WhatsApp QR page shortcut
        location /qr {
            proxy_pass http://openclaw/qr;
        }
    }
}
