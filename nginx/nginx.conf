events {
    worker_connections 1024;
}

http {
    # ── Upstream services ────────────────────────────────────────────────────
    upstream cs_dashboard {
        server cs-dashboard:3001;
    }
    upstream docs_agent {
        server docs-agent:8100;
    }
    upstream general_agent {
        server general-agent:8200;
    }
    upstream bridge {
        server bridge:3100;
    }

    # ── Main server block ─────────────────────────────────────────────────────
    server {
        listen 80;
        server_name _;

        client_max_body_size 100M;   # allow large document uploads

        # CS Dashboard – main UI
        location / {
            proxy_pass         http://cs_dashboard;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   Upgrade           $http_upgrade;
            proxy_set_header   Connection        "upgrade";
            proxy_http_version 1.1;
            proxy_read_timeout 300s;
        }

        # Channel Bridge (WhatsApp/Telegram Webhook / QR)
        # Note: The dashboard also proxies bridge health/config,
        # but this allows direct bridge access if needed.
        location /bridge/ {
            rewrite ^/bridge/(.*)$ /$1 break;
            proxy_pass         http://bridge;
            proxy_set_header   Host            $host;
            proxy_set_header   X-Real-IP       $remote_addr;
        }

        # WhatsApp QR page shortcut
        location /qr {
            proxy_pass http://bridge/qr;
        }
    }
}
